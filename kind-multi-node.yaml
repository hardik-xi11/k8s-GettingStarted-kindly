kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: k8s-demo-cluster
nodes:
  # The Control Plane (Master)
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 8080
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
  # Three Worker Nodes
  - role: worker
  - role: worker
  - role: worker